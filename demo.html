<!DOCTYPE html>
<html lang="en">
  <head>
<script>
/* ───────────────────────────────────────────────────────────────────────────
   DEMO MODE — Mock WebSocket
   Replaces the real device connection with an in-browser simulation so the app
   is fully interactive when hosted on GitHub Pages (no ESP32 present).
   Speaks the same JSON protocol as the firmware: init "i", update "u", health "h".
   ─────────────────────────────────────────────────────────────────────────── */
(function () {
  "use strict";

  // Initial simulated device state (mirrors firmware defaults / band scene).
  var state = {
    sc: "band",
    ip: "10.0.0.237 (demó)",
    cwc: "#8833ff",
    csc: "#3366ff",
    f:  { o: true, b: 40,  ct: 3200, p: "default" },
    w:  { o: true, b: 80,  c: "#ff6600", wm: 0, p: "custom" },
    sp: { o: true, b: 100, c: "#3366ff", r: 80, w: 0, a: 0, u: 0, p: "custom" }
  };

  function clone(o) { return JSON.parse(JSON.stringify(o)); }

  // Build the init message the firmware sends on connect.
  function initMsg() {
    return JSON.stringify({
      t: "i", cl: 1, sc: state.sc, ip: state.ip,
      cwc: state.cwc, csc: state.csc,
      f: state.f, w: state.w, sp: state.sp
    });
  }

  // Build a fake health message (static, healthy-looking values).
  function healthMsg() {
    return JSON.stringify({
      t: "h",
      d: { tc: 46.8, rs: -58, hp: 238000, is: [] }
    });
  }

  // A mock that looks enough like a WebSocket for the app's usage.
  function MockWS(url) {
    this.url = url;
    this.readyState = 0;            // CONNECTING
    this.onopen = this.onmessage = this.onclose = this.onerror = null;
    var self = this;
    // Simulate async connect.
    setTimeout(function () {
      self.readyState = 1;         // OPEN
      if (self.onopen) self.onopen({ target: self });
      // Push init, then a health frame shortly after — like the firmware.
      self._emit(initMsg());
      setTimeout(function () { self._emit(healthMsg()); }, 400);
    }, 350);
  }
  MockWS.OPEN = 1; MockWS.CONNECTING = 0; MockWS.CLOSING = 2; MockWS.CLOSED = 3;

  MockWS.prototype._emit = function (data) {
    if (this.readyState === 1 && this.onmessage) {
      this.onmessage({ data: data });
    }
  };

  // The app calls send() with a JSON update. We mutate local state and, for a
  // realistic feel, the device would broadcast the change back — but since this
  // is a single client we simply absorb it (the UI already updated optimistically).
  MockWS.prototype.send = function (raw) {
    var m;
    try { m = JSON.parse(raw); } catch (e) { return; }
    if (!m) return;

    // Heartbeat: the app pings {t:"p"} every second and closes the socket if no
    // {t:"p"} comes back within 1.2s. Echo it so the connection stays alive.
    if (m.t === "p") {
      var self = this;
      setTimeout(function () { self._emit(JSON.stringify({ t: "p" })); }, 30);
      return;
    }
    if (m.t !== "u") return;

    var g = m.g, d = m.d || {};
    if (g === "f" && state.f) Object.assign(state.f, mapPatch(d, state.f));
    else if (g === "w" && state.w) Object.assign(state.w, mapPatch(d, state.w));
    else if (g === "sp" && state.sp) Object.assign(state.sp, mapPatch(d, state.sp));
    else if (g === "sc" && d.save) { state.sc = d.save; }
    else if (g === "sc" && typeof d.s === "string") { state.sc = d.s; }
    // No echo needed: the app updates its own state optimistically on send.
  };

  // Copy known fields from a patch into our stored state object.
  function mapPatch(d, base) {
    var out = {};
    ["o","b","ct","c","wm","r","w","a","u","p"].forEach(function (k) {
      if (d[k] !== undefined) out[k] = d[k];
    });
    return out;
  }

  MockWS.prototype.close = function () {
    this.readyState = 3;
    if (this.onclose) this.onclose({ target: this, code: 1000 });
  };
  MockWS.prototype.addEventListener = function (type, fn) {
    if (type === "open")    this.onopen = fn;
    if (type === "message") this.onmessage = fn;
    if (type === "close")   this.onclose = fn;
    if (type === "error")   this.onerror = fn;
  };
  MockWS.prototype.removeEventListener = function () {};

  // Only hijack the device socket (port 81). Leave any other WS untouched.
  var RealWS = window.WebSocket;
  window.WebSocket = function (url, protocols) {
    if (typeof url === "string" && url.indexOf(":81") !== -1) {
      return new MockWS(url);
    }
    return new RealWS(url, protocols);
  };
  window.WebSocket.OPEN = 1; window.WebSocket.CONNECTING = 0;
  window.WebSocket.CLOSING = 2; window.WebSocket.CLOSED = 3;

  // Neutralise navigation away to /help, /logs, /health (no server in demo).
  document.addEventListener("click", function (e) {
    var a = e.target;
    while (a && a.tagName !== "A") a = a.parentElement;
    if (!a) return;
    var href = a.getAttribute("href") || "";
    if (href === "/help" || href === "/help.html" ||
        href === "/logs" || href === "/logs.html" || href === "/health") {
      e.preventDefault();
      e.stopPropagation();
    }
  }, true);

  // Dismissible demo pill.
  window.addEventListener("DOMContentLoaded", function () {
    var b = document.getElementById("demo-banner");
    if (b) b.addEventListener("click", function () {
      b.style.opacity = "0";
      setTimeout(function () { b.style.display = "none"; }, 300);
    });
  });
})();
</script>
<style>
  #demo-banner {
    position: fixed; left: 50%; transform: translateX(-50%);
    bottom: calc(env(safe-area-inset-bottom, 0px) + 10px); z-index: 99999;
    background: rgba(79,143,255,0.96); color: #fff;
    font: 600 12px/1.3 -apple-system, 'SF Pro Display', sans-serif;
    text-align: center; padding: 8px 14px; border-radius: 999px;
    box-shadow: 0 4px 16px rgba(0,0,0,0.35);
    -webkit-backdrop-filter: blur(8px); backdrop-filter: blur(8px);
    display: flex; align-items: center; gap: 8px; max-width: 92vw;
    cursor: pointer; transition: opacity .3s;
  }
  #demo-banner b { font-weight: 800; }
  #demo-banner .x { opacity: .7; font-weight: 700; }
</style>
